name: ipl-analytics-de-pipeline CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  DQ_THRESHOLD: '90'
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint and Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 pipeline/ --max-line-length=120 --extend-ignore=E501,W503,W291,W293

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run tests
        run: |
          if [ -d "tests" ] && [ "$(find tests -name '*.py' | wc -l)" -gt 0 ]; then
            pytest tests/ -v --tb=short
          else
            echo "No test files yet — skipping"
          fi

  dq-validate:
    name: Data Quality Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run DQ checks
        run: python pipeline/dq_checks.py
        env:
          DQ_THRESHOLD: ${{ env.DQ_THRESHOLD }}
      - name: Validate Airflow DAG syntax
        run: python -c "import ast; ast.parse(open('pipeline/airflow_dag.py').read()); print('DAG OK')"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: dq-validate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Final DQ gate
        run: python pipeline/dq_checks.py
        env:
          DQ_THRESHOLD: ${{ env.DQ_THRESHOLD }}
      - name: Deploy summary
        run: echo "Pipeline ipl_analytics_pipeline deployed successfully"
